// Show actions
function showResult(){
  const planet=planetSelect.value;
  const house=houseSelect.value;
  if(!planet||!house){alert("Select both");return;}
  const key=planet+"-"+house;
  const resultDiv=document.getElementById("result");
  document.body.style.background=planetColors[planet]||"#333";
  if(data[key]){
    const actions=data[key].slice(0,5); // only first 5 actions
    resultDiv.innerHTML=`
      <img class="planet-img" src="${planetImages[planet]}" alt="${planet}">
      <h3>Actions for ${planet} in House ${house}</h3>
      <ul id="actionsList">
        ${actions.map(a=>`<li><input type="checkbox" onclick="updateScore()"> ${a}</li>`).join("")}
      </ul>
      <div class="score-box">Progress: <span id="score">0%</span></div>
    `;
  } else resultDiv.innerHTML="<p>No actions defined.</p>";
}

// Update score
function updateScore(){
  const boxes=document.querySelectorAll("#actionsList input");
  const total=boxes.length;
  const checked=Array.from(boxes).filter(cb=>cb.checked).length;
  document.getElementById("score").innerText=Math.round((checked/total)*100)+"%";
}
