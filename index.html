// Show actions and scoring
function showResult(){
  const planet = planetSelect.value;
  const house = houseSelect.value;
  const key = `${planet}-${house}`;
  const resultDiv = document.getElementById("result");
  document.body.style.background = planetColors[planet] || "#333";

  if(data[key]){
    const actions = data[key];
    // Display actions with checkboxes
    resultDiv.innerHTML = `
      <img class="planet-img" src="${planetImages[planet]}" alt="${planet}">
      <h3>Actions for ${planet} in House ${house}</h3>
      <ul id="actionsList">
        ${actions.map((a,i)=>`<li><input type="checkbox" id="task${i}" onclick="updateScore()">${a}</li>`).join("")}
      </ul>
      <div class="score-box">Progress: <span id="score">0%</span></div>
    `;
  } else {
    resultDiv.innerHTML = "<p>No actions defined.</p>";
  }
}

// Update score when checkboxes change
function updateScore(){
  const checkboxes = document.querySelectorAll("#actionsList input[type='checkbox']");
  const total = checkboxes.length;
  const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
  const percent = Math.round((checked/total)*100);
  document.getElementById("score").innerText = percent+"%";
}
